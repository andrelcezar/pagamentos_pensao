<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Controle Pessoal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-storage-compat.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <style>
        :root { 
            --primary: #475569; --success: #10b981; --danger: #ef4444; 
            --bg: #f8fafc; --card: #ffffff; --text: #1e293b;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid #e2e8f0; padding-bottom: 10px; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; margin-bottom: 20px; }
        .stat-val { font-size: 2.2rem; font-weight: 800; color: var(--danger); }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; width: 100%; margin-top: 15px; }
        .grid-meses { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; margin: 12px 0; }
        .mes-tag { background: #f0fdf4; padding: 8px; border-radius: 6px; border: 1px solid #bbf7d0; text-align: center; }
        .mes-tag span { display: block; font-size: 0.65rem; font-weight: 800; color: #166534; }
        .table-wrap { background: white; border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f1f5f9; padding: 12px; text-align: left; font-size: 0.7rem; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }
        #overlay { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); z-index: 999; flex-direction: column; justify-content: center; align-items: center; color: white; }
        .spinner { border: 3px solid rgba(255,255,255,0.2); border-top: 3px solid white; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="overlay"><div class="spinner"></div><p style="margin-top:15px;">Validando Comprovante...</p></div>

<div class="container">
    <div class="header">
        <div style="font-weight: 800; color: var(--primary);">CONTROLE DE PENSÃO</div>
        <div id="progresso" style="font-size: 0.75rem; font-weight: 700;"></div>
    </div>

    <div class="card">
        <div style="font-size: 0.7rem; font-weight: 700; color: #64748b;">TOTAL EM ABERTO</div>
        <div class="stat-val" id="total-geral">R$ 0,00</div>
    </div>

    <div class="card">
        <div style="font-weight: 700; margin-bottom: 12px;">Simulador de Lote</div>
        <div style="display:flex; gap:10px;">
            <input type="number" id="input-qtd" value="8" min="1" style="width:50px; padding:8px; border-radius:6px; border:1px solid #ddd; text-align:center; font-weight:700;">
            <button class="btn btn-primary" onclick="simularLote()">Calcular Selecionados</button>
        </div>
        
        <div id="box-lote" style="display:none; margin-top:15px; padding:15px; background:#f8fafc; border: 1px solid #e2e8f0; border-radius:10px;">
            <div id="total-lote-info" style="font-weight:800; color:var(--success); font-size:1.3rem;"></div>
            <div style="font-size:0.7rem; font-weight:700; color:#64748b; margin-top:10px;">ESTES MESES SERÃO MARCADOS COMO PAGOS:</div>
            <div id="lista-meses-detalhe" class="grid-meses"></div>
            
            <input type="file" id="upload-lote" style="display:none" onchange="processarLote(this)" accept="image/*,.pdf">
            <button class="btn btn-success" onclick="document.getElementById('upload-lote').click()">Validar e Quitar Todos</button>
        </div>
    </div>

    <div class="table-wrap">
        <table>
            <thead><tr><th>Mês/Ano</th><th>Valor</th><th>Status</th><th>Ações</th></tr></thead>
            <tbody id="corpo-tabela"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCzAXQ4DrPvIIgOdMY-14b8nuyVZN0dU54",
        authDomain: "pensao-fd881.firebaseapp.com",
        databaseURL: "https://pensao-fd881-default-rtdb.firebaseio.com",
        projectId: "pensao-fd881",
        storageBucket: "pensao-fd881.firebasestorage.app",
        messagingSenderId: "483959140139",
        appId: "1:483959140139:web:e08f75dbe8a4ef845a1f6e"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const storage = firebase.storage();

    const dataInicio = new Date(2024, 2, 1);
    const hoje = new Date();
    let parcelasLocais = [];

    const nomesMeses = [
        'janeiro', 'fevereiro', 'março', 'abril', 'maio', 'junho',
        'julho', 'agosto', 'setembro', 'outubro', 'novembro', 'dezembro'
    ];

    function getValorAno(ano) {
        if (ano <= 2024) return 1412 * 0.3;
        if (ano === 2025) return 1518 * 0.3;
        return 1621 * 0.3;
    }

    db.ref('pensao').on('value', (snapshot) => {
        const statusNuvem = snapshot.val() || {};
        const corpo = document.getElementById('corpo-tabela');
        corpo.innerHTML = ''; parcelasLocais = [];
        let pendente = 0, pagos = 0, total = 0;
        let d = new Date(dataInicio);

        while (d <= hoje) {
            const ano = d.getFullYear();
            const id = `p-${ano}-${d.getMonth()}`;
            const valor = getValorAno(ano);
            const info = statusNuvem[id] || { status: 'pendente' };
            const mes = d.toLocaleString('pt-BR', { month: 'long' });
            
            parcelasLocais.push({ id, valor, status: info.status, ref: `${mes}/${ano}` });
            total++;
            if(info.status === 'pago') pagos++; else pendente += valor;

            corpo.innerHTML += `
                <tr>
                    <td style="text-transform:capitalize;">${mes}/${ano}</td>
                    <td>R$ ${valor.toFixed(2).replace('.',',')}</td>
                    <td style="color:${info.status === 'pago' ? 'green' : 'red'}; font-weight:700;">${info.status.toUpperCase()}</td>
                    <td>
                        ${info.status === 'pendente' ? 
                        `<input type="file" onchange="validarIndividual(this, '${id}', ${valor.toFixed(2)})" style="font-size:0.6rem;">` : 
                        `<button onclick="revogar('${id}')" style="color:red; border:none; background:none; cursor:pointer; font-size:10px;">ANULAR</button>`}
                    </td>
                </tr>`;
            d.setMonth(d.getMonth() + 1);
        }
        document.getElementById('total-geral').innerText = `R$ ${pendente.toLocaleString('pt-BR',{minimumFractionDigits:2})}`;
        document.getElementById('progresso').innerText = `${pagos}/${total} PAGOS`;
    });

    function simularLote() {
        const qtd = parseInt(document.getElementById('input-qtd').value) || 1;
        const lista = parcelasLocais.filter(p => p.status === 'pendente').slice(0, qtd);
        if(lista.length === 0) return alert("Nada a pagar.");
        
        const soma = lista.reduce((acc, x) => acc + x.valor, 0);
        const grid = document.getElementById('lista-meses-detalhe');
        grid.innerHTML = '';
        lista.forEach(p => { grid.innerHTML += `<div class="mes-tag"><strong>${p.ref}</strong></div>`; });
        
        document.getElementById('total-lote-info').innerText = `Valor Total: R$ ${soma.toLocaleString('pt-BR',{minimumFractionDigits:2})}`;
        document.getElementById('box-lote').style.display = 'block';
        window.loteAtivo = { alvo: lista, soma: soma.toFixed(2) };
    }

    function normalizarTexto(txt = '') {
        return txt
            .normalize('NFD')
            .replace(/[\u0300-\u036f]/g, '')
            .replace(/\s+/g, ' ')
            .trim()
            .toLowerCase();
    }

    function parseCurrencyCandidates(textoOriginal) {
        const texto = textoOriginal || '';
        const encontrados = [];
        const regex = /(?:r\$\s*)?(\d{1,3}(?:\.\d{3})*,\d{2}|\d+[,\.]\d{2})/gi;
        let match;
        while ((match = regex.exec(texto)) !== null) {
            const bruto = match[1];
            const normalizado = bruto.replace(/\./g, '').replace(',', '.');
            const valor = Number(normalizado);
            if (!Number.isNaN(valor)) encontrados.push(valor);
        }
        return encontrados;
    }

    function detectarTipoDocumento(textoOriginal) {
        const texto = normalizarTexto(textoOriginal);

        const sinaisHolerite = [
            'holerite', 'demonstrativo de pagamento', 'demonstrativo de salario',
            'vencimentos', 'descontos', 'inss', 'fgts', 'cargo', 'data admissao',
            'empresa', 'cadastro', 'referencia'
        ];

        const sinaisBanco = [
            'pix', 'transferencia', 'comprovante', 'ted', 'doc', 'agencia',
            'conta', 'autenticacao', 'neon', 'nubank', 'itau', 'bradesco',
            'caixa', 'inter', 'santander'
        ];

        const scoreHolerite = sinaisHolerite.filter(x => texto.includes(x)).length;
        const scoreBanco = sinaisBanco.filter(x => texto.includes(x)).length;

        if (scoreHolerite >= 2 && scoreHolerite >= scoreBanco) return 'holerite';
        if (scoreBanco >= 1) return 'bancario';
        return 'desconhecido';
    }

    function extrairCompetenciaHolerite(textoOriginal) {
        const texto = textoOriginal || '';
        const textoNorm = normalizarTexto(textoOriginal);

        let match = texto.match(/\b(0?[1-9]|1[0-2])\s*[\/\-]\s*(20\d{2})\b/);
        if (match) return { mes: Number(match[1]), ano: Number(match[2]) };

        match = texto.match(/\b(20\d{2})\s*[\/\-]\s*(0?[1-9]|1[0-2])\b/);
        if (match) return { mes: Number(match[2]), ano: Number(match[1]) };

        for (let i = 0; i < nomesMeses.length; i++) {
            const regex = new RegExp(`\\b${nomesMeses[i]}\\s*(?:de)?\\s*(20\\d{2})\\b`, 'i');
            const m = textoNorm.match(regex);
            if (m) return { mes: i + 1, ano: Number(m[1]) };
        }

        return null;
    }

    function obterMesAnoPorId(id) {
        const partes = id.replace('p-', '').split('-');
        const ano = Number(partes[0]);
        const mesIndex = Number(partes[1]);
        return { mes: mesIndex + 1, ano };
    }

    function extrairValorPensaoHolerite(textoOriginal) {
        const linhas = (textoOriginal || '').split(/\n+/).map(x => x.trim()).filter(Boolean);
        for (const linha of linhas) {
            const n = normalizarTexto(linha);
            if (n.includes('pensao judicial')) {
                const valores = parseCurrencyCandidates(linha);
                if (valores.length) return valores[valores.length - 1];
            }
        }
        return null;
    }

    function validarHolerite(texto, id, valorAlvo) {
        const competencia = extrairCompetenciaHolerite(texto);
        if (!competencia) {
            return {
                ok: false,
                motivo: 'Não foi possível identificar o mês/ano no holerite.'
            };
        }

        const esperado = obterMesAnoPorId(id);
        if (competencia.mes !== esperado.mes || competencia.ano !== esperado.ano) {
            return {
                ok: false,
                motivo: `Competência do holerite (${String(competencia.mes).padStart(2,'0')}/${competencia.ano}) não corresponde à parcela selecionada.`
            };
        }

        const valorPensao = extrairValorPensaoHolerite(texto);
        const textoNorm = normalizarTexto(texto);
        const mencionaPensao = textoNorm.includes('pensao judicial');

        if (valorPensao !== null) {
            if (Math.abs(valorPensao - valorAlvo) <= 5) {
                return {
                    ok: true,
                    motivo: `Holerite validado. Competência confere e a linha de pensão indica valor compatível.`,
                    competenciaValidada: `${String(competencia.mes).padStart(2,'0')}/${competencia.ano}`
                };
            }
            return {
                ok: false,
                motivo: `A linha "Pensão Judicial" foi encontrada, mas o valor lido (${valorPensao.toFixed(2)}) não confere com a parcela esperada.`
            };
        }

        if (mencionaPensao) {
            return {
                ok: true,
                motivo: `Holerite validado. Competência confere e há menção a pensão judicial.`,
                competenciaValidada: `${String(competencia.mes).padStart(2,'0')}/${competencia.ano}`
            };
        }

        return {
            ok: false,
            motivo: 'Holerite identificado, mas não encontrei evidência suficiente de pensão judicial.'
        };
    }

    async function auditoria(file, valorAlvo, inputElement, id = null, permitirHolerite = false) {
        try {
            const imageSrc = file.type === "application/pdf" ? await pdfToImage(file) : URL.createObjectURL(file);
            const { data: { text } } = await Tesseract.recognize(imageSrc, 'por');

            if (file.type !== "application/pdf") {
                URL.revokeObjectURL(imageSrc);
            }

            const tipo = detectarTipoDocumento(text);

            if (tipo === 'holerite') {
                if (!permitirHolerite || !id) {
                    alert('Holerite só pode ser usado na validação individual da parcela correspondente.');
                    if (inputElement) inputElement.value = "";
                    return { ok: false };
                }

                const resultado = validarHolerite(text, id, valorAlvo);
                if (!resultado.ok) {
                    alert(resultado.motivo);
                    if (inputElement) inputElement.value = "";
                    return { ok: false };
                }

                return {
                    ok: true,
                    tipo: 'holerite',
                    competenciaValidada: resultado.competenciaValidada || null
                };
            }

            const vBr = valorAlvo.toFixed(2).replace('.', ',');
            if (text.toLowerCase().includes("neon") && (text.includes(vBr) || text.includes(valorAlvo.toFixed(2)))) {
                return {
                    ok: true,
                    tipo: 'bancario',
                    competenciaValidada: null
                };
            }

            alert(`Erro: Valor R$ ${vBr} não encontrado no comprovante.`);
        } catch (e) {
            alert("Erro no OCR.");
        }

        if(inputElement) inputElement.value = "";
        return { ok: false };
    }

    async function pdfToImage(file) {
        const pdf = await pdfjsLib.getDocument(await file.arrayBuffer()).promise;
        const page = await pdf.getPage(1);
        const viewport = page.getViewport({ scale: 2 });
        const canvas = document.createElement('canvas');
        canvas.height = viewport.height; canvas.width = viewport.width;
        await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
        return canvas.toDataURL();
    }

    async function processarLote(input) {
        document.getElementById('overlay').style.display = 'flex';
        const valorLote = parseFloat(window.loteAtivo.soma);
        
        const resultado = await auditoria(input.files[0], valorLote, input, null, false);

        if (resultado.ok) {
            const ref = storage.ref(`comprovantes/lote_${Date.now()}`);
            await ref.put(input.files[0]);
            const url = await ref.getDownloadURL();
            
            const updates = {};
            window.loteAtivo.alvo.forEach(p => {
                updates['/pensao/' + p.id] = {
                    status: 'pago',
                    comprovante: url,
                    dataPagamento: new Date().toISOString(),
                    tipoComprovante: resultado.tipo || 'bancario'
                };
            });
            
            await db.ref().update(updates);
            alert("Sucesso! " + window.loteAtivo.alvo.length + " parcelas quitadas.");
            document.getElementById('box-lote').style.display = 'none';
        }

        document.getElementById('overlay').style.display = 'none';
    }

    async function validarIndividual(input, id, valor) {
        document.getElementById('overlay').style.display = 'flex';

        const resultado = await auditoria(input.files[0], valor, input, id, true);

        if (resultado.ok) {
            const ref = storage.ref(`comprovantes/${id}`);
            await ref.put(input.files[0]);
            await db.ref('pensao/'+id).set({
                status: 'pago',
                comprovante: await ref.getDownloadURL(),
                tipoComprovante: resultado.tipo || 'bancario',
                competenciaValidada: resultado.competenciaValidada || null,
                dataPagamento: new Date().toISOString()
            });
        }

        document.getElementById('overlay').style.display = 'none';
    }

    function revogar(id) { if(confirm("Anular?")) db.ref('pensao/'+id).remove(); }
</script>
</body>
</html>
