<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório de Transparência - Status em Tempo Real</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1e293b; --success: #16a34a; --danger: #dc2626; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #1e293b; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        
        .header { border-bottom: 2px solid #f1f5f9; margin-bottom: 30px; padding-bottom: 20px; text-align: center; }
        .card-total { background: var(--primary); color: white; padding: 30px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .total-val { font-size: 2.2rem; font-weight: 700; color: #f87171; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: #94a3b8; font-size: 0.75rem; text-transform: uppercase; padding: 15px; border-bottom: 2px solid #f1f5f9; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; }

        /* Status Dinâmico */
        .badge { padding: 5px 12px; border-radius: 99px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
        .badge-pendente { background: #fee2e2; color: var(--danger); }
        .badge-pago { background: #dcfce7; color: var(--success); }

        .btn-view { padding: 6px 12px; background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
        
        @media print { .no-print { display: none; } .container { box-shadow: none; border: none; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Relatório de Transparência</h1>
        <p>Acompanhamento de Débitos e Comprovantes</p>
    </div>

    <div class="card-total">
        <div>
            <div style="font-size: 0.85rem; opacity: 0.8;">SALDO EM ABERTO</div>
            <div id="resumo-meses" style="font-weight: 600;">Carregando...</div>
        </div>
        <div class="total-val" id="total-v">R$ 0,00</div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Período</th>
                <th>Valor</th>
                <th>Status</th>
                <th>Comprovante</th>
            </tr>
        </thead>
        <tbody id="corpo-v"></tbody>
    </table>

    <div style="text-align: center; margin-top: 30px;" class="no-print">
        <button onclick="window.print()" style="padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600;">
            📥 Gerar Relatório PDF
        </button>
    </div>
</div>

<script>
    const dataI = new Date(2024, 2, 1); // Março/2024
    const hoje = new Date();
    let somaPendente = 0;
    let mesesPendentes = 0;

    function getSM(ano) { return ano === 2024 ? 1412 : (ano === 2025 ? 1518 : 1621); }

    let d = new Date(dataI);
    const corpo = document.getElementById('corpo-v');

    while (d <= hoje) {
        const ano = d.getFullYear();
        const mes = d.toLocaleString('pt-BR', { month: 'long' });
        const valor = getSM(ano) * 0.3;
        const id = `p-${d.getTime()}`;
        
        // Verifica o status no armazenamento local
        const status = localStorage.getItem(id) || 'pendente';
        if(status === 'pendente') {
            somaPendente += valor;
            mesesPendentes++;
        }

        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td style="text-transform: capitalize;"><strong>${mes}</strong> / ${ano}</td>
            <td>R$ ${valor.toFixed(2).replace('.',',')}</td>
            <td><span class="badge badge-${status}">${status === 'pago' ? 'Pago' : 'Pendente'}</span></td>
            <td>
                ${status === 'pago' ? 
                '<button class="btn-view" onclick="alert(\'Arquivo anexado no PDF oficial.\')">📄 Ver Arquivo</button>' : 
                '<span style="color:#94a3b8; font-size:0.8rem;">---</span>'}
            </td>
        `;
        corpo.appendChild(tr);
        d.setMonth(d.getMonth() + 1);
    }

    document.getElementById('total-v').innerText = `R$ ${somaPendente.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
    document.getElementById('resumo-meses').innerText = `${mesesPendentes} meses em aberto`;
</script>
</body>
</html>
