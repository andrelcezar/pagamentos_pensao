<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acompanhamento de Pensão</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">

  <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

  <style>
    :root{
      --primary:#475569;
      --success:#16a34a;
      --danger:#dc2626;
      --bg:#f8fafc;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --border:#e2e8f0;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      padding:20px;
      background:var(--bg);
      color:var(--text);
      font-family:'Inter',sans-serif;
    }

    .container{
      max-width:1000px;
      margin:0 auto;
    }

    .header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom:24px;
      border-bottom:1px solid var(--border);
      padding-bottom:12px;
    }

    .title{
      font-size:1.3rem;
      font-weight:800;
      color:var(--primary);
    }

    .subtitle{
      color:var(--muted);
      font-size:.9rem;
      margin-top:4px;
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:16px;
      margin-bottom:20px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:14px;
      padding:18px;
      box-shadow:0 4px 12px rgba(15,23,42,.05);
    }

    .card-label{
      font-size:.75rem;
      font-weight:800;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.04em;
    }

    .card-value{
      margin-top:8px;
      font-size:1.8rem;
      font-weight:800;
    }

    .success{ color:var(--success); }
    .danger{ color:var(--danger); }

    .table-wrap{
      background:#fff;
      border:1px solid var(--border);
      border-radius:14px;
      overflow:hidden;
      box-shadow:0 4px 12px rgba(15,23,42,.05);
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    th{
      text-align:left;
      background:#f8fafc;
      padding:12px;
      font-size:.72rem;
      text-transform:uppercase;
      color:var(--muted);
      border-bottom:1px solid var(--border);
    }

    td{
      padding:12px;
      border-bottom:1px solid #f1f5f9;
      font-size:.92rem;
    }

    .badge{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      font-size:.75rem;
      font-weight:800;
    }

    .badge-pago{
      background:#dcfce7;
      color:#166534;
    }

    .badge-pendente{
      background:#fee2e2;
      color:#991b1b;
    }

    .empty{
      padding:18px;
      color:var(--muted);
    }

    a.link{
      color:var(--primary);
      font-weight:700;
      text-decoration:none;
    }

    a.link:hover{
      text-decoration:underline;
    }

    @media (max-width: 768px){
      body{ padding:12px; }
      th, td{ padding:10px; font-size:.85rem; }
      .card-value{ font-size:1.4rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <div class="title">Acompanhamento de Pensão</div>
        <div class="subtitle">Página apenas para visualização das parcelas pagas e pendentes.</div>
      </div>
    </div>

    <div class="cards">
      <div class="card">
        <div class="card-label">Total pago</div>
        <div class="card-value success" id="total-pago">R$ 0,00</div>
      </div>
      <div class="card">
        <div class="card-label">Total pendente</div>
        <div class="card-value danger" id="total-pendente">R$ 0,00</div>
      </div>
      <div class="card">
        <div class="card-label">Parcelas pagas</div>
        <div class="card-value" id="qtd-pagas">0</div>
      </div>
      <div class="card">
        <div class="card-label">Parcelas pendentes</div>
        <div class="card-value" id="qtd-pendentes">0</div>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Mês/Ano</th>
            <th>Valor</th>
            <th>Status</th>
            <th>Data do pagamento</th>
            <th>Comprovante</th>
          </tr>
        </thead>
        <tbody id="corpo-tabela"></tbody>
      </table>
      <div id="estado-vazio" class="empty" style="display:none;">Nenhuma parcela encontrada.</div>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCzAXQ4DrPvIIgOdMY-14b8nuyVZN0dU54",
      authDomain: "pensao-fd881.firebaseapp.com",
      databaseURL: "https://pensao-fd881-default-rtdb.firebaseio.com",
      projectId: "pensao-fd881",
      storageBucket: "pensao-fd881.firebasestorage.app",
      messagingSenderId: "483959140139",
      appId: "1:483959140139:web:e08f75dbe8a4ef845a1f6e"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const dataInicio = new Date(2024, 2, 1);
    const hoje = new Date();

    function getValorAno(ano) {
      if (ano <= 2024) return 1412 * 0.3;
      if (ano === 2025) return 1518 * 0.3;
      return 1621 * 0.3;
    }

    function moneyBR(valor) {
      return `R$ ${Number(valor || 0).toLocaleString('pt-BR', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      })}`;
    }

    function formatarData(dataIso) {
      if (!dataIso) return "-";
      const d = new Date(dataIso);
      if (Number.isNaN(d.getTime())) return "-";
      return d.toLocaleString("pt-BR");
    }

    function obterTodasParcelas(statusNuvem = {}) {
      const parcelas = [];
      let d = new Date(dataInicio);

      while (d <= hoje) {
        const ano = d.getFullYear();
        const mesIndex = d.getMonth();
        const id = `p-${ano}-${mesIndex}`;
        const info = statusNuvem[id] || { status: "pendente" };
        const valor = Number(info.valor ?? getValorAno(ano));
        const status = info.status || "pendente";
        const mes = d.toLocaleString("pt-BR", { month: "long" });
        const ref = `${mes}/${ano}`;

        parcelas.push({
          id,
          ref,
          valor,
          status,
          dataPagamento: info.dataPagamento || null,
          comprovante: info.comprovante || null
        });

        d.setMonth(d.getMonth() + 1);
      }

      const idsBase = new Set(parcelas.map(p => p.id));

      Object.entries(statusNuvem).forEach(([id, info]) => {
        if (!idsBase.has(id) && /^p-\d{4}-\d{1,2}$/.test(id)) {
          const partes = id.replace("p-", "").split("-");
          const ano = Number(partes[0]);
          const mesIndex = Number(partes[1]);
          const data = new Date(ano, mesIndex, 1);
          const ref = `${data.toLocaleString("pt-BR", { month: "long" })}/${ano}`;

          parcelas.push({
            id,
            ref,
            valor: Number(info.valor ?? getValorAno(ano)),
            status: info.status || "pendente",
            dataPagamento: info.dataPagamento || null,
            comprovante: info.comprovante || null
          });
        }
      });

      parcelas.sort((a, b) => {
        const [mesA, anoA] = a.id.replace("p-", "").split("-").map(Number);
        const [mesB, anoB] = b.id.replace("p-", "").split("-").map(Number);
        const dataA = new Date(mesA, anoA, 1).getTime();
        const dataB = new Date(mesB, anoB, 1).getTime();
        return dataA - dataB;
      });

      return parcelas;
    }

    function renderizar(statusNuvem = {}) {
      const corpo = document.getElementById("corpo-tabela");
      const vazio = document.getElementById("estado-vazio");
      corpo.innerHTML = "";

      const parcelas = obterTodasParcelas(statusNuvem);

      let totalPago = 0;
      let totalPendente = 0;
      let qtdPagas = 0;
      let qtdPendentes = 0;

      parcelas.forEach(item => {
        if (item.status === "pago") {
          totalPago += item.valor;
          qtdPagas++;
        } else {
          totalPendente += item.valor;
          qtdPendentes++;
        }

        corpo.innerHTML += `
          <tr>
            <td style="text-transform:capitalize;">${item.ref}</td>
            <td>${moneyBR(item.valor)}</td>
            <td>
              <span class="badge ${item.status === "pago" ? "badge-pago" : "badge-pendente"}">
                ${item.status.toUpperCase()}
              </span>
            </td>
            <td>${formatarData(item.dataPagamento)}</td>
            <td>
              ${item.comprovante
                ? `<a class="link" href="${item.comprovante}" target="_blank" rel="noopener noreferrer">Ver comprovante</a>`
                : "-"}
            </td>
          </tr>
        `;
      });

      document.getElementById("total-pago").innerText = moneyBR(totalPago);
      document.getElementById("total-pendente").innerText = moneyBR(totalPendente);
      document.getElementById("qtd-pagas").innerText = String(qtdPagas);
      document.getElementById("qtd-pendentes").innerText = String(qtdPendentes);

      vazio.style.display = parcelas.length ? "none" : "block";
    }

    db.ref("pensao").on("value", (snapshot) => {
      renderizar(snapshot.val() || {});
    });
  </script>
</body>
</html>
