<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório de Transparência</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #ffffff; color: #1e293b; padding: 40px 20px; line-height: 1.6; }
        .container { max-width: 800px; margin: auto; }
        .header { border-bottom: 2px solid #e2e8f0; margin-bottom: 40px; padding-bottom: 20px; }
        .card-total { background: #1e293b; color: white; padding: 30px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .total-val { font-size: 2.2rem; font-weight: 700; color: #f87171; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: #64748b; font-size: 0.8rem; text-transform: uppercase; padding: 12px; border-bottom: 1px solid #e2e8f0; }
        td { padding: 16px 12px; border-bottom: 1px solid #f1f5f9; }
        .status { color: #dc2626; font-weight: 600; font-size: 0.9rem; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 style="margin:0; font-size: 1.5rem;">Relatório de Prestação de Contas</h1>
        <p style="color: #64748b; margin: 5px 0 0;">Início: Março/2024 | Base: 30% Salário Mínimo Vigente</p>
    </div>

    <div class="card-total">
        <div>
            <div style="font-size: 0.9rem; opacity: 0.8;">SALDO TOTAL ACUMULADO</div>
            <div id="qtd-m">0 meses pendentes</div>
        </div>
        <div class="total-val" id="total-v">R$ 0,00</div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Período</th>
                <th>Salário Mínimo</th>
                <th>Valor Devido</th>
                <th>Situação</th>
            </tr>
        </thead>
        <tbody id="corpo-v"></tbody>
    </table>

    <div style="margin-top: 50px; border-top: 1px solid #eee; padding-top: 20px; font-size: 0.8rem; color: #94a3b8; text-align: center;">
        Relatório gerado automaticamente para fins de transparência e organização.
        <br><button class="no-print" onclick="window.print()" style="margin-top:15px; cursor:pointer; background:none; border:1px solid #cbd5e1; padding:5px 15px; border-radius:4px;">Imprimir PDF</button>
    </div>
</div>

<script>
    const dataI = new Date(2024, 2, 1);
    const hoje = new Date();
    let soma = 0;
    let meses = 0;

    function getSM(ano) { return ano === 2024 ? 1412 : (ano === 2025 ? 1518 : 1621); }

    let d = new Date(dataI);
    const corpo = document.getElementById('corpo-v');

    while (d <= hoje) {
        const sm = getSM(d.getFullYear());
        const valor = sm * 0.3;
        soma += valor;
        meses++;

        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td style="text-transform: capitalize;">${d.toLocaleString('pt-BR',{month:'long'})} / ${d.getFullYear()}</td>
            <td style="color:#64748b">R$ ${sm.toFixed(2).replace('.',',')}</td>
            <td><strong>R$ ${valor.toFixed(2).replace('.',',')}</strong></td>
            <td><span class="status">AGUARDANDO</span></td>
        `;
        corpo.appendChild(tr);
        d.setMonth(d.getMonth() + 1);
    }

    document.getElementById('total-v').innerText = `R$ ${soma.toLocaleString('pt-BR',{minimumFractionDigits:2})}`;
    document.getElementById('qtd-m').innerText = `${meses} meses registrados`;
</script>
</body>
</html>
