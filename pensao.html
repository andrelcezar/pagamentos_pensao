<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Pro - Controle de Pensão</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --success: #16a34a; --danger: #dc2626; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #1e293b; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        
        .card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .grid-header { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        h1, h2 { margin: 0 0 15px 0; font-size: 1.25rem; }
        .stat-val { font-size: 1.8rem; font-weight: 700; color: var(--primary); }
        .stat-label { font-size: 0.875rem; color: #64748b; }

        .calc-box { background: #eff6ff; border: 1px solid #dbeafe; border-radius: 8px; padding: 16px; }
        input { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; width: 100px; }
        button { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        button:hover { opacity: 0.9; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 12px; font-size: 0.75rem; text-transform: uppercase; color: #64748b; border-bottom: 2px solid #e2e8f0; }
        td { padding: 12px; border-bottom: 1px solid #e2e8f0; font-size: 0.938rem; }
        
        .badge { padding: 4px 10px; border-radius: 99px; font-size: 0.75rem; font-weight: 600; cursor: pointer; }
        .badge-pendente { background: #fee2e2; color: var(--danger); }
        .badge-pago { background: #dcfce7; color: var(--success); }
        
        @media (max-width: 600px) { .grid-header { grid-template-columns: 1fr; } .no-mobile { display: none; } }
        @media print { .no-print { display: none; } .card { box-shadow: none; border: 1px solid #eee; } }
    </style>
</head>
<body>

<div class="container">
    <div class="grid-header">
        <div class="card">
            <span class="stat-label">Total Acumulado (desde Mar/24)</span>
            <div class="stat-val" id="total-geral">R$ 0,00</div>
            <span class="stat-label" id="qtd-meses">0 meses</span>
        </div>
        <div class="card calc-box no-print">
            <h2>Calculadora Rápida</h2>
            <div style="display: flex; gap: 10px; align-items: center;">
                <input type="number" id="input-qtd" placeholder="Qtd meses">
                <button onclick="calcMeses()">Calcular Total</button>
            </div>
            <div id="res-calc" style="margin-top:10px; font-weight:600; color:var(--success);"></div>
        </div>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h2>Histórico de Pagamentos</h2>
            <button class="no-print" style="background: #64748b;" onclick="window.print()">Gerar PDF</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Mês/Ano</th>
                    <th>Valor (30%)</th>
                    <th>Status</th>
                    <th class="no-mobile">Ação</th>
                </tr>
            </thead>
            <tbody id="tabela-corpo"></tbody>
        </table>
    </div>
</div>

<script>
    const dataInicio = new Date(2024, 2, 1);
    const hoje = new Date();
    const lista = [];

    function getSM(ano) {
        if (ano === 2024) return 1412;
        if (ano === 2025) return 1518;
        return 1621;
    }

    let d = new Date(dataInicio);
    const corpo = document.getElementById('tabela-corpo');

    while (d <= hoje) {
        const ano = d.getFullYear();
        const mes = d.toLocaleString('pt-BR', { month: 'long' });
        const valor = getSM(ano) * 0.3;
        const id = `p-${d.getTime()}`;
        
        lista.push({ id, mes: `${mes}/${ano}`, valor });

        const statusSalvo = localStorage.getItem(id) || 'pendente';
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><strong style="text-transform: capitalize;">${mes}</strong> ${ano}</td>
            <td>R$ ${valor.toFixed(2).replace('.',',')}</td>
            <td><span id="badge-${id}" class="badge badge-${statusSalvo}" onclick="toggleStatus('${id}')">${statusSalvo.toUpperCase()}</span></td>
            <td class="no-mobile"><input type="file" style="font-size:10px; width:120px"></td>
        `;
        corpo.appendChild(tr);
        d.setMonth(d.getMonth() + 1);
    }

    document.getElementById('total-geral').innerText = `R$ ${lista.reduce((a,b)=>a+b.valor,0).toLocaleString('pt-BR',{minimumFractionDigits:2})}`;
    document.getElementById('qtd-meses').innerText = `${lista.length} meses acumulados`;

    function toggleStatus(id) {
        const b = document.getElementById(`badge-${id}`);
        const novo = b.classList.contains('badge-pendente') ? 'pago' : 'pendente';
        b.className = `badge badge-${novo}`;
        b.innerText = novo.toUpperCase();
        localStorage.setItem(id, novo);
    }

    function calcMeses() {
        const q = parseInt(document.getElementById('input-qtd').value);
        if(!q) return;
        let soma = 0;
        for(let i=0; i < Math.min(q, lista.length); i++) soma += lista[i].valor;
        document.getElementById('res-calc').innerText = `Total: R$ ${soma.toLocaleString('pt-BR',{minimumFractionDigits:2})}`;
    }
</script>
</body>
</html>
